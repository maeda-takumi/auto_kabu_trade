<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Auto Kabu Trade | 取引管理</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar card">
        <div>
          <p class="eyebrow">AUTO KABU TRADE</p>
          <h1>取引コンソール</h1>
          <p class="muted">主注文・保護注文の入力と取引状況モニタリング</p>
        </div>
        <div class="badge-wrap">
          <span id="dbStatus" class="badge">DB初期化中...</span>
        </div>
      </header>

      <section class="layout-grid">
        <article class="card panel input-panel">
          <div class="panel-header">
            <h2>注文入力</h2>
            <span class="muted">API未接続（UI / DB保存のみ）</span>
          </div>
          <form id="orderForm" class="form-grid">
            <div class="wide sub-panel" id="orderRowsSection">
              <div class="sub-panel-header">
                <h3>注文対象（複数可）</h3>
                <button id="addRowButton" class="ghost" type="button">+ 銘柄入力欄を追加</button>
              </div>
              <div id="orderRows" class="order-rows"></div>
            </div>

            <label>
              売買区分
              <select id="side" name="side">
                <option value="BUY">買い</option>
                <option value="SELL">売り</option>
              </select>
            </label>

            <label>
              執行条件
              <select id="orderType" name="orderType">
                <option value="MARKET">成行</option>
                <option value="LIMIT">指値</option>
              </select>
            </label>

            <label>
              市場コード（Exchange）
              <select id="exchange" name="exchange">
                <option value="1">1: 東証</option>
                <option value="9">9: SOR</option>
                <option value="27">27: 東証+</option>
              </select>
            </label>

            <label>
              取引区分（CashMargin）
              <select id="cashMargin" name="cashMargin">
                <option value="1">1: 現物</option>
                <option value="2">2: 信用新規</option>
                <option value="3">3: 信用返済</option>
              </select>
            </label>

            <label>
              信用種別（MarginTradeType）
              <select id="marginTradeType" name="marginTradeType">
                <option value="1">1: 制度</option>
                <option value="2">2: 一般長期</option>
                <option value="3">3: 一般デイトレ</option>
              </select>
            </label>

            <label>
              受渡区分（DelivType）
              <input id="delivType" name="delivType" type="number" min="0" value="2" required />
            </label>

            <label>
              預り区分（FundType）
              <input id="fundType" name="fundType" type="text" value="AA" required />
            </label>

            <label>
              口座種別（AccountType）
              <select id="accountType" name="accountType">
                <option value="2">2: 一般</option>
                <option value="4" selected>4: 特定</option>
                <option value="12">12: 法人</option>
              </select>
            </label>

            <label>
              期限（timeInForce）
              <select id="timeInForce" name="timeInForce">
                <option value="DAY">当日</option>
                <option value="GTC">無期限</option>
              </select>
            </label>

            <label>
              有効期限（ExpireDay）
              <input id="expireDay" name="expireDay" type="number" min="0" value="0" required />
            </label>

            <label class="wide">
              メモ
              <textarea id="note" name="note" rows="3" placeholder="トレード意図など"></textarea>
            </label>

            <div class="form-footer">
              <button id="submitButton" class="primary" type="submit">複数注文を実行</button>
              <p class="form-hint">誤発注防止のため Enter キーでは実行されません。</p>
            </div>
          </form>
        </article>

        <article class="card panel">
          <div class="panel-header">
            <h2>リアルタイム取引状況</h2>
            <span id="lastUpdated" class="muted">最終更新: -</span>
          </div>

          <div class="stat-grid">
            <article class="stat">
              <p>監視中注文</p>
              <h3 id="activeCount">0</h3>
            </article>
            <article class="stat">
              <p>本日約定件数</p>
              <h3 id="filledCount">0</h3>
            </article>
            <article class="stat">
              <p>本日実現損益</p>
              <h3 id="realizedPnL">¥0</h3>
            </article>
          </div>

          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>時刻</th>
                  <th>注文ID</th>
                  <th>銘柄</th>
                  <th>区分</th>
                  <th>数量</th>
                  <th>状態</th>
                </tr>
              </thead>
              <tbody id="statusTableBody"></tbody>
            </table>
          </div>
        </article>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
